media:
  - name: images
    label: Images
    input: public/images
    output: /images
    extensions: [jpg, jpeg, png, webp, gif, svg]
    categories: [image]
    rename: safe

content:
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    subfolders: true
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{title}/index.md"
      field: create
    exclude:
      - _template.md
    view:
      layout: tree
      node:
        filename: index.md
        hideDirs: others
      fields: [title, date, draft, tags]
      primary: title
      sort: [date, title]
      search: [title, summary, tags]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
        options:
          maxlength: 120
      - name: summary
        label: Summary
        type: text
        required: true
        options:
          maxlength: 240
      - name: date
        label: Publish date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: tags
        label: Tags
        type: string
        list: true
        required: true
      - name: draft
        label: Draft
        type: boolean
        default: true
      - name: image
        label: Social image
        type: image
        options:
          media: images
          path: blog
          rename: safe
          extensions: [jpg, jpeg, png, webp, gif, svg]
      - name: body
        label: Body
        type: rich-text
        required: true
        options:
          format: markdown
          media: images
          path: blog
          rename: safe
          switcher: true
