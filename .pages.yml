settings:
  content:
    merge: true

# Note: GitHub-hosted images are fine for small/temporary assets.
# If posts become image-heavy, move media to Cloudflare R2 and store image URLs
# in frontmatter/body instead of committing binaries to this repository.
media:
  - name: images
    label: Images
    input: public/images
    output: /images
    extensions: [jpg, jpeg, png, webp, gif, svg]
    categories: [image]
    rename: safe

content:
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    subfolders: true
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{fields.slug}/index.md"
    exclude:
      - _template.md
    view:
      layout: tree
      node:
        filename: index.md
        hideDirs: nodes
      fields: [title, date, draft, tags]
      primary: title
      sort: [date, title]
      search: [title, summary, tags]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
        options:
          maxlength: 120
      - name: slug
        label: URL slug
        description: Short English identifier used in the post URL. Use lowercase letters, numbers, and hyphens.
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          message: "Use lowercase letters, numbers, and single hyphens only."
        options:
          placeholder: "restarting-github-blog"
      - name: summary
        label: Summary
        type: text
        required: true
        options:
          maxlength: 240
      - name: date
        label: Publish date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: tags
        label: Tags
        type: string
        list: true
        required: true
      - name: draft
        label: Draft
        type: boolean
        default: true
      - name: timestampActions
        label: Date shortcuts
        description: Fill publish or updated metadata with the current local time and timezone.
        type: timestamp-actions
        default: ""
      - name: time
        label: Publish time
        description: Optional. Use HH:mm only when the exact publish time matters.
        type: string
        default: ""
        options:
          placeholder: "HH:mm"
      - name: timezone
        label: Publish timezone
        description: Optional. Leave blank to use the site default, UTC.
        type: string
        default: ""
        options:
          placeholder: "IANA timezone, e.g. Asia/Seoul"
      - name: updatedDate
        label: Updated date
        description: Optional. Use only after a published post has meaningful changes.
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
      - name: updatedTime
        label: Updated time
        description: Optional. Use HH:mm only when the exact update time matters.
        type: string
        default: ""
        options:
          placeholder: "HH:mm"
      - name: updatedTimezone
        label: Updated timezone
        description: Optional. Leave blank to reuse the publish timezone.
        type: string
        default: ""
        options:
          placeholder: "IANA timezone, e.g. America/New_York"
      - name: image
        label: Social image
        description: Optional. Used for link previews and social cards.
        type: image
        options:
          media: images
          path: public/images/blog
          rename: safe
          extensions: [jpg, jpeg, png, webp, gif, svg]
      - name: body
        label: Body
        type: rich-text
        required: true
        options:
          format: markdown
          media: images
          path: public/images/blog
          rename: safe
          switcher: true
