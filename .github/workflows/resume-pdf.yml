name: Update resume PDF

on:
  push:
    branches: ["main"]
    paths:
      - "src/content/resume/Yieum_Yoon_CV.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "resume-pdf"
  cancel-in-progress: true

jobs:
  render:
    name: Render PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Render resume PDF
        run: npm run resume:pdf

      - name: Commit generated PDF
        run: |
          if git diff --quiet -- public/resume.pdf; then
            echo "Resume PDF is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          git commit -m "Update generated resume PDF"
          git push origin HEAD:main
